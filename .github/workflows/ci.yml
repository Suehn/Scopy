name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Build
        run: make build

  unit_tests:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Unit Tests
        run: make test-unit

      - name: Upload Unit Test Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log-${{ github.run_id }}
          path: logs/test-unit.log
          if-no-files-found: warn

  strict_concurrency:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Strict Concurrency Tests
        run: make test-strict

      - name: Upload Strict Concurrency Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-concurrency-test-log-${{ github.run_id }}
          path: logs/strict-concurrency-test.log
          if-no-files-found: warn
