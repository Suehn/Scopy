name: Hosted TSan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tsan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tsan_hosted:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Hosted Thread Sanitizer Tests
        run: make test-tsan

      - name: Upload TSan Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosted-tsan-log-${{ github.run_id }}
          path: logs/test-tsan.log
          if-no-files-found: warn
